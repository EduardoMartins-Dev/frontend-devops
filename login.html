<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Agenda Acadêmica — Login</title>
</head>
<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">Agenda Acadêmica</a>
        </div>
    </nav>

    <div class="login-page">
        <div class="login-card card">
            <h1 class="login-titulo">Bem-vindo</h1>

            <div class="login-tabs">
                <button class="tab-btn tab-ativo" id="btn-tab-entrar" onclick="mostrarTab('entrar')">Entrar</button>
                <button class="tab-btn" id="btn-tab-cadastro" onclick="mostrarTab('cadastro')">Cadastrar</button>
            </div>

            <form id="form-entrar" onsubmit="fazerLogin(event)">
                <div class="campo-grupo">
                    <label for="login-email">E-mail</label>
                    <input type="email" id="login-email" placeholder="seu@email.com" required>
                </div>
                <div class="campo-grupo">
                    <label for="login-senha">Senha</label>
                    <input type="password" id="login-senha" placeholder="••••••" required>
                </div>
                <button type="submit" class="btn-submit">Entrar</button>
                <p class="form-erro" id="erro-entrar"></p>
            </form>

            <form id="form-cadastro" style="display:none" onsubmit="fazerCadastro(event)">
                <div class="campo-grupo">
                    <label for="reg-email">E-mail</label>
                    <input type="email" id="reg-email" placeholder="seu@email.com" required>
                </div>
                <div class="campo-grupo">
                    <label for="reg-senha">Senha</label>
                    <input type="password" id="reg-senha" placeholder="mínimo 6 caracteres" required minlength="6">
                </div>
                <div class="campo-grupo">
                    <label for="reg-confirma">Confirmar Senha</label>
                    <input type="password" id="reg-confirma" placeholder="repita a senha" required minlength="6">
                </div>
                <button type="submit" class="btn-submit">Criar Conta</button>
                <p class="form-erro" id="erro-cadastro"></p>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
    <script>
        db.auth.getSession().then(({ data: { session } }) => {
            if (session) window.location.href = 'index.html'
        })

        function mostrarTab(tab) {
            const isEntrar = tab === 'entrar'
            document.getElementById('form-entrar').style.display = isEntrar ? 'block' : 'none'
            document.getElementById('form-cadastro').style.display = isEntrar ? 'none' : 'block'
            document.getElementById('btn-tab-entrar').classList.toggle('tab-ativo', isEntrar)
            document.getElementById('btn-tab-cadastro').classList.toggle('tab-ativo', !isEntrar)
            document.getElementById('erro-entrar').textContent = ''
            document.getElementById('erro-cadastro').textContent = ''
        }

        async function fazerLogin(event) {
            event.preventDefault()
            const email = document.getElementById('login-email').value
            const senha = document.getElementById('login-senha').value
            const erroEl = document.getElementById('erro-entrar')
            erroEl.textContent = ''

            const { error } = await db.auth.signInWithPassword({ email, password: senha })
            if (error) {
                erroEl.textContent = 'E-mail ou senha incorretos.'
            } else {
                window.location.href = 'index.html'
            }
        }

        async function fazerCadastro(event) {
            event.preventDefault()
            const email = document.getElementById('reg-email').value
            const senha = document.getElementById('reg-senha').value
            const confirma = document.getElementById('reg-confirma').value
            const erroEl = document.getElementById('erro-cadastro')
            erroEl.textContent = ''
            erroEl.style.color = '#ef4444'

            if (senha !== confirma) {
                erroEl.textContent = 'As senhas não coincidem.'
                return
            }

            const { data, error } = await db.auth.signUp({ email, password: senha })
            if (error) {
                erroEl.textContent = 'Erro ao criar conta: ' + error.message
            } else if (data.session) {
                window.location.href = 'index.html'
            } else {
                erroEl.style.color = '#15803d'
                erroEl.textContent = 'Conta criada! Verifique seu e-mail para confirmar o cadastro.'
            }
        }
    </script>
</body>
</html>
